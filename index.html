<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gains">
<meta name="theme-color" content="#000000">
<title>Gains</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--c1:#1C1C1E;--c2:#2C2C2E;--c3:#3A3A3C;
  --sep:rgba(255,255,255,.07);
  --t1:#fff;--t2:#EBEBF5;--t3:#8E8E93;--t4:#48484A;
  --blue:#0A84FF;--green:#30D158;--orange:#FF9F0A;--red:#FF453A;--teal:#5AC8FA;--purple:#BF5AF2;
  --sf:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',system-ui,sans-serif
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--sf)}
body{overscroll-behavior:none}

/* ── Pages ── */
.pg{display:none;position:fixed;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:none}
.pg.on{display:block}
.sc{
  padding-top:max(env(safe-area-inset-top),20px);
  padding-bottom:calc(68px + env(safe-area-inset-bottom));
  padding-left:16px;padding-right:16px
}

/* ── Type ── */
h1{font-size:34px;font-weight:700;letter-spacing:-.5px;padding:10px 0 4px;color:var(--t1)}
.slbl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin:20px 0 8px}

/* ── Cards ── */
.card{background:var(--c1);border-radius:16px;padding:16px;margin-bottom:10px}
.card2{background:var(--c1);border-radius:16px;margin-bottom:10px;overflow:hidden}
.row{display:flex;align-items:center;justify-content:space-between}
.rn{font-size:13px;color:var(--t3)}
.rv{font-size:13px;color:var(--t1);font-weight:500}

/* ── Ring ── */
.ring-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0 4px}
.ring-mid{position:relative;width:168px;height:168px}
.ring-mid svg{width:168px;height:168px;display:block}
#ring-track{stroke:#2C2C2E;stroke-width:13;fill:none}
#ring-fill{stroke:#30D158;stroke-width:13;fill:none;stroke-linecap:round;stroke-dasharray:0 439.82;transition:stroke-dasharray .55s cubic-bezier(.4,0,.2,1),stroke .3s}
.ring-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.ring-n{font-size:40px;font-weight:700;letter-spacing:-1.5px;line-height:1;transition:color .3s}
.ring-s{font-size:12px;color:var(--t3);margin-top:3px}
.ring-lbl{font-size:14px;color:var(--t3);margin-top:10px;text-align:center}

/* ── Progress bar ── */
.pbar{background:var(--c2);border-radius:100px;height:6px;overflow:hidden}
.pf{height:100%;border-radius:100px;transition:width .55s cubic-bezier(.4,0,.2,1)}
.pf.g{background:var(--green)}.pf.b{background:var(--blue)}.pf.o{background:var(--orange)}

/* ── Weight display ── */
.wtr{display:flex;align-items:baseline;gap:6px;margin:6px 0 10px}
.wtn{font-size:48px;font-weight:700;letter-spacing:-2px;line-height:1}
.wtu{font-size:17px;color:var(--t3)}

/* ── Stats 2×2 ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.sb{background:var(--c1);border-radius:16px;padding:16px}
.sl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:4px}
.sv{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1.1}
.sv.g{color:var(--green)}.sv.o{color:var(--orange)}.sv.b{color:var(--blue)}.sv.p{color:var(--purple)}
.ss{font-size:13px;color:var(--t3);margin-top:3px}

/* ── Countdown ── */
.cdr{display:flex;gap:8px;margin:8px 0 4px}
.cdb{flex:1;background:var(--c2);border-radius:12px;padding:13px 8px;text-align:center}
.cdn{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1}
.cdl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-top:3px}

/* ── Tasks ── */
.tr2{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:.5px solid var(--sep);cursor:pointer;-webkit-user-select:none;user-select:none}
.tr2:last-child{border-bottom:none}
.tr2:active{background:rgba(255,255,255,.04)}
.chk{width:24px;height:24px;border-radius:50%;border:2px solid var(--c3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s cubic-bezier(.4,0,.2,1)}
.chk.dn{background:var(--green);border-color:var(--green)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.meal{background:var(--orange)}.dot.workout{background:var(--blue)}.dot.habit{background:var(--teal)}
.tb{flex:1;min-width:0}
.tn{font-size:16px;line-height:1.3;transition:color .18s}
.tn.dn{color:var(--t4);text-decoration:line-through;text-decoration-color:var(--t4)}
.td{font-size:13px;color:var(--t3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txp{font-size:13px;font-weight:600;color:var(--t3);flex-shrink:0;transition:color .18s}
.txp.dn{color:var(--green)}

/* ── Day card extras ── */
.xpb{background:rgba(48,209,88,.14);color:var(--green);font-size:13px;font-weight:600;padding:4px 12px;border-radius:100px;display:inline-block}
@keyframes pop{0%,100%{transform:scale(1)}40%{transform:scale(1.2)}}
.pop{animation:pop .22s ease}

/* ── Celebrate ── */
.cel{text-align:center;padding:32px 16px}
.cel-e{font-size:64px;line-height:1;margin-bottom:10px}
.cel-t{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:6px}
.cel-s{font-size:15px;color:var(--t3)}

/* ── Weight input / log ── */
.wi{background:var(--c1);border:none;border-radius:16px;font-size:48px;font-weight:700;letter-spacing:-2px;color:var(--t1);width:100%;padding:22px 20px;text-align:center;outline:none;-webkit-appearance:none;font-family:var(--sf);display:block;margin-bottom:10px}
.wi::placeholder{color:var(--c3)}
.btn{background:var(--blue);color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:600;padding:16px;width:100%;font-family:var(--sf);cursor:pointer;margin-bottom:10px;-webkit-appearance:none}
.btn:active{opacity:.75}
.whi{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:.5px solid var(--sep)}
.whi:last-child{border-bottom:none}
.whd{font-size:15px;color:var(--t1)}
.whr{display:flex;align-items:baseline;gap:6px}
.whv{font-size:17px;font-weight:600;color:var(--t1)}
.whdf{font-size:13px;color:var(--t3)}
.whdf.up{color:var(--green)}.whdf.dn2{color:var(--red)}

/* ── Legend pills ── */
.legend{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.lpill{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t3)}
.ldot{width:7px;height:7px;border-radius:50%}

/* ── Tab bar ── */
.tbar{position:fixed;bottom:0;left:0;right:0;background:rgba(28,28,30,.9);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border-top:.5px solid rgba(255,255,255,.1);z-index:1000}
.tbi{display:flex;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 4px;cursor:pointer;-webkit-user-select:none}
.tab svg{width:25px;height:25px;stroke:var(--t3);transition:stroke .12s;fill:none;stroke-linecap:round;stroke-linejoin:round}
.tab.on svg{stroke:var(--blue)}
.tlbl{font-size:10px;font-weight:500;color:var(--t3);transition:color .12s}
.tab.on .tlbl{color:var(--blue)}

/* ── Toast ── */
.toast{position:fixed;top:max(calc(env(safe-area-inset-top)+12px),20px);left:50%;transform:translateX(-50%) translateY(-10px);background:rgba(44,44,46,.97);color:var(--t1);padding:10px 20px;border-radius:100px;font-size:14px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Empty ── */
.empty{text-align:center;padding:48px 16px;color:var(--t3);font-size:15px;line-height:1.6}

/* ── Height habit note ── */
.hn{font-size:12px;color:var(--t4);line-height:1.5;margin-top:10px;padding-top:10px;border-top:.5px solid var(--sep)}
</style>
</head>
<body>

<!-- ────── Page: Progress ────── -->
<div class="pg on" id="pg-progress">
<div class="sc">
<h1>Progress</h1>

<!-- Daily ring -->
<div class="card" style="text-align:center">
  <div class="ring-wrap">
    <div class="ring-mid">
      <svg viewBox="0 0 168 168" xmlns="http://www.w3.org/2000/svg">
        <circle id="ring-track" cx="84" cy="84" r="70"/>
        <circle id="ring-fill" cx="84" cy="84" r="70" transform="rotate(-90 84 84)"/>
      </svg>
      <div class="ring-txt">
        <div class="ring-n" id="ring-n">0%</div>
        <div class="ring-s">today</div>
      </div>
    </div>
  </div>
  <div class="ring-lbl" id="ring-lbl">—</div>
</div>

<!-- Weight goal -->
<div class="card">
  <div class="row" style="margin-bottom:4px">
    <span style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3)">Weight goal</span>
    <span style="font-size:13px;color:var(--t3)">62 → 70 kg</span>
  </div>
  <div class="wtr">
    <div class="wtn" id="wt-n">62.0</div>
    <div class="wtu">kg</div>
    <div style="margin-left:auto;font-size:15px;color:var(--t3)">/ 70 kg</div>
  </div>
  <div class="pbar"><div class="pf g" id="wt-bar" style="width:0%"></div></div>
  <div class="row" style="margin-top:8px">
    <span class="rn" id="wt-rem">8.0 kg to go</span>
    <span class="rv" id="wt-eta">~20 weeks</span>
  </div>
</div>

<!-- Countdown -->
<div class="card">
  <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:2px">Goal countdown</div>
  <div class="cdr" id="cdr"></div>
  <div style="font-size:11px;color:var(--t4);text-align:center;margin-top:6px" id="cdr-note"></div>
</div>

<!-- Stats grid -->
<div class="g2">
  <div class="sb"><div class="sl">Total XP</div><div class="sv g" id="s-xp">0</div><div class="ss">pts earned</div></div>
  <div class="sb"><div class="sl">Streak</div><div class="sv o" id="s-str">0</div><div class="ss">days in a row</div></div>
  <div class="sb"><div class="sl">This week</div><div class="sv b" id="s-wk">0%</div><div class="ss">tasks done</div></div>
  <div class="sb"><div class="sl">Height habits</div><div class="sv p" id="s-hh">0%</div><div class="ss">sleep + nutrition</div></div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="lpill"><div class="ldot" style="background:var(--orange)"></div>Meal</div>
  <div class="lpill"><div class="ldot" style="background:var(--blue)"></div>Workout</div>
  <div class="lpill"><div class="ldot" style="background:var(--teal)"></div>Habit</div>
</div>

</div>
</div>

<!-- ────── Page: Today ────── -->
<div class="pg" id="pg-today">
<div class="sc">
  <h1 id="t-title">Today</h1>
  <div id="t-body"></div>
</div>
</div>

<!-- ────── Page: Log ────── -->
<div class="pg" id="pg-log">
<div class="sc">
<h1>Log weight</h1>
<input class="wi" id="wi" type="number" step="0.1" min="30" max="200" inputmode="decimal" placeholder="62.0" autocomplete="off">
<button class="btn" onclick="logWt()">Save weight</button>
<div class="slbl">History</div>
<div class="card2" id="wt-hist"></div>
</div>
</div>

<!-- ────── Tab bar ────── -->
<div class="tbar">
<div class="tbi">
  <div class="tab on" id="tab-progress" onclick="sw('progress')">
    <svg viewBox="0 0 24 24" stroke-width="1.7">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    <span class="tlbl">Progress</span>
  </div>
  <div class="tab" id="tab-today" onclick="sw('today')">
    <svg viewBox="0 0 24 24" stroke-width="1.7">
      <rect x="3" y="4" width="18" height="18" rx="2.5"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
      <polyline points="9 16 11 18 15 14"/>
    </svg>
    <span class="tlbl">Today</span>
  </div>
  <div class="tab" id="tab-log" onclick="sw('log')">
    <svg viewBox="0 0 24 24" stroke-width="1.7">
      <circle cx="12" cy="12" r="9"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="12" x2="15" y2="14"/>
      <line x1="12" y1="5" x2="12" y2="3"/>
    </svg>
    <span class="tlbl">Log</span>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
const SCH = {
  0:{label:'Rest day',emoji:'😴',tasks:[
    {id:'s0a',n:'Breakfast',d:'3 eggs · bread · milk · fruit',xp:15,t:'meal'},
    {id:'s0b',n:'Morning snack',d:'Yogurt · oats · honey · fruit',xp:10,t:'meal'},
    {id:'s0c',n:'Afternoon snack',d:'Milk · bread · honey',xp:10,t:'meal'},
    {id:'s0d',n:'Evening snack',d:'2 eggs · milk — 1h before bed',xp:10,t:'meal'},
    {id:'s0e',n:'Sleep 8h+',d:'GH peaks during deep sleep',xp:15,t:'habit'},
    {id:'s0f',n:'Drink 2L water',d:'Hydration supports growth',xp:10,t:'habit'},
  ]},
  1:{label:'Home gym — upper body',emoji:'💪',tasks:[
    {id:'s1a',n:'Breakfast',d:'3 eggs · bread · milk · banana',xp:15,t:'meal'},
    {id:'s1b',n:'Pre-workout fuel',d:'Oats · milk · honey (30 min before)',xp:10,t:'meal'},
    {id:'s1c',n:'Home gym — upper body',d:'Chest · shoulders · abs — 3× sets',xp:30,t:'workout'},
    {id:'s1d',n:'Post-workout snack',d:'Yogurt · fruit · honey',xp:10,t:'meal'},
    {id:'s1e',n:'Evening snack',d:'2 eggs · milk — 1h before bed',xp:10,t:'meal'},
    {id:'s1f',n:'Sleep 8h+',d:'Muscle repair happens overnight',xp:15,t:'habit'},
  ]},
  2:{label:'Full body gym',emoji:'🏋️',tasks:[
    {id:'s2a',n:'Breakfast',d:'3 eggs · oats · bread · milk · banana',xp:15,t:'meal'},
    {id:'s2b',n:'Pre-workout fuel',d:'Banana · 2 bread slices · honey',xp:10,t:'meal'},
    {id:'s2c',n:'Full body gym',d:'Complete all exercises — full body session',xp:35,t:'workout'},
    {id:'s2d',n:'Post-workout refuel',d:'Yogurt · oats · honey · fruit',xp:10,t:'meal'},
    {id:'s2e',n:'Evening snack',d:'3 eggs · milk — 1h before bed',xp:10,t:'meal'},
    {id:'s2f',n:'Sleep 8h+',d:'This is when muscle actually grows',xp:15,t:'habit'},
  ]},
  3:{label:'Home gym + Soccer',emoji:'⚽',tasks:[
    {id:'s3a',n:'Breakfast',d:'3 eggs · oats · bread · milk · banana',xp:15,t:'meal'},
    {id:'s3b',n:'Home gym — lower body',d:'Lats · biceps · shoulder width — 3×',xp:30,t:'workout'},
    {id:'s3c',n:'Post-gym / pre-soccer snack',d:'Yogurt · fruit · bread · honey',xp:10,t:'meal'},
    {id:'s3d',n:'Pre-soccer fuel',d:'Banana · no-sugar juice — 30 min before',xp:5,t:'meal'},
    {id:'s3e',n:'Soccer match',d:'1 hour of play',xp:25,t:'workout'},
    {id:'s3f',n:'Evening recovery',d:'3 eggs · milk · honey after match',xp:10,t:'meal'},
  ]},
  4:{label:'Full body gym + Tennis',emoji:'🎾',tasks:[
    {id:'s4a',n:'Breakfast',d:'3 eggs · oats · bread · milk · banana',xp:15,t:'meal'},
    {id:'s4b',n:'Pre-gym fuel',d:'Banana · bread · honey',xp:5,t:'meal'},
    {id:'s4c',n:'Full body gym',d:'Complete all exercises — full body session',xp:35,t:'workout'},
    {id:'s4d',n:'Post-gym / pre-tennis',d:'Yogurt · oats · honey',xp:10,t:'meal'},
    {id:'s4e',n:'Tennis practice',d:'1 hour of practice',xp:25,t:'workout'},
    {id:'s4f',n:'Evening snack',d:'2 eggs · milk — 1h before bed',xp:10,t:'meal'},
  ]},
  5:{label:'Tennis match day',emoji:'🎾',tasks:[
    {id:'s5a',n:'Breakfast',d:'3 eggs · bread · milk · banana',xp:15,t:'meal'},
    {id:'s5b',n:'Pre-match carb load',d:'Oats · milk · honey · banana (2h before)',xp:15,t:'meal'},
    {id:'s5c',n:'Tennis match',d:'Full competitive match',xp:30,t:'workout'},
    {id:'s5d',n:'Post-match recovery',d:'Yogurt · fruit · juice immediately after',xp:10,t:'meal'},
    {id:'s5e',n:'Evening snack',d:'2 eggs · milk — 1h before bed',xp:10,t:'meal'},
  ]},
  6:{label:'Rest day',emoji:'😴',tasks:[
    {id:'s6a',n:'Breakfast',d:'3 eggs · bread · milk · fruit',xp:15,t:'meal'},
    {id:'s6b',n:'Morning snack',d:'Yogurt · honey · fruit',xp:10,t:'meal'},
    {id:'s6c',n:'Afternoon snack',d:'Oats · milk · honey',xp:10,t:'meal'},
    {id:'s6d',n:'Evening snack',d:'2 eggs · milk — 1h before bed',xp:10,t:'meal'},
    {id:'s6e',n:'Sleep 8h+',d:'Recovery · GH peaks during deep sleep',xp:15,t:'habit'},
    {id:'s6f',n:'Drink 2L water',d:'Support recovery and growth',xp:10,t:'habit'},
  ]},
};

const SW=62, GW=70;
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// ═══════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════
const dk = d => (d||new Date()).toISOString().slice(0,10);
const getck = s => { try{return JSON.parse(localStorage.getItem('ck_'+s)||'[]')}catch{return[]} };
const setck = (s,v) => localStorage.setItem('ck_'+s, JSON.stringify(v));
const getwl = () => { try{return JSON.parse(localStorage.getItem('wl')||'[]')}catch{return[]} };
const savewl = v => localStorage.setItem('wl', JSON.stringify(v));
const curwt = () => { const l=getwl(); return l.length ? l[l.length-1].weight : SW };

// ═══════════════════════════════════════════════
// CALCULATIONS
// ═══════════════════════════════════════════════
function todayProg() {
  const today=new Date(), dow=today.getDay(), k=dk(today);
  const ck=getck(k), ts=SCH[dow].tasks;
  const done=ts.filter(t=>ck.includes(t.id));
  const xe=done.reduce((s,t)=>s+t.xp,0);
  const xt=ts.reduce((s,t)=>s+t.xp,0);
  return {pct:xt?Math.round(xe/xt*100):0, xe, xt, done:done.length, tot:ts.length};
}

function calcStreak() {
  let s=0, today=new Date();
  for(let i=0;i<90;i++) {
    const d=new Date(today); d.setDate(d.getDate()-i);
    if(getck(dk(d)).length>0) s++;
    else if(i>0) break;
  }
  return s;
}

function totalXP() {
  let x=0, today=new Date();
  for(let i=0;i<365;i++) {
    const d=new Date(today); d.setDate(d.getDate()-i);
    const ck=getck(dk(d)); if(!ck.length) continue;
    SCH[d.getDay()].tasks.forEach(t=>{ if(ck.includes(t.id)) x+=t.xp });
  }
  return x;
}

function weekPct() {
  let tot=0, dn=0, today=new Date();
  for(let i=0;i<7;i++) {
    const d=new Date(today); d.setDate(d.getDate()-i);
    const ck=getck(dk(d)), ts=SCH[d.getDay()].tasks;
    tot+=ts.length; ts.forEach(t=>{ if(ck.includes(t.id)) dn++ });
  }
  return tot ? Math.round(dn/tot*100) : 0;
}

function heightHabitPct() {
  let tot=0, dn=0, today=new Date();
  for(let i=0;i<14;i++) {
    const d=new Date(today); d.setDate(d.getDate()-i);
    const ck=getck(dk(d)), hs=SCH[d.getDay()].tasks.filter(t=>t.t==='habit'||t.t==='meal');
    tot+=hs.length; hs.forEach(t=>{ if(ck.includes(t.id)) dn++ });
  }
  return tot ? Math.round(dn/tot*100) : 0;
}

function calcETA() {
  const cw=curwt(), rem=GW-cw;
  if(rem<=0) return {weeks:0,days:0,date:new Date(),rate:0};
  const log=getwl();
  let rate=0.4;
  if(log.length>=2) {
    const f=log[0], l=log[log.length-1];
    const days=(new Date(l.date)-new Date(f.date))/864e5;
    const dw=l.weight-f.weight;
    if(days>6&&dw>0) rate=Math.max(.1,Math.min(1,dw/days*7));
  }
  const weeks=Math.ceil(rem/rate);
  const date=new Date(); date.setDate(date.getDate()+weeks*7);
  return {weeks, days:weeks*7, date, rate};
}

// ═══════════════════════════════════════════════
// RENDER: PROGRESS
// ═══════════════════════════════════════════════
function renderProgress() {
  const cw=curwt();
  const wpct=Math.min(100,Math.max(0,(cw-SW)/(GW-SW)*100));
  document.getElementById('wt-n').textContent=cw.toFixed(1);
  document.getElementById('wt-bar').style.width=wpct.toFixed(1)+'%';
  document.getElementById('wt-rem').textContent=(Math.max(0,GW-cw).toFixed(1))+' kg to go';

  // Ring
  const tp=todayProg();
  const r=70, circ=2*Math.PI*r;
  const fill=circ*tp.pct/100;
  const fc=document.getElementById('ring-fill');
  fc.style.strokeDasharray=fill.toFixed(2)+' '+circ.toFixed(2);
  const col=tp.pct===0?'#3A3A3C':tp.pct<40?'#FF9F0A':tp.pct<80?'#0A84FF':'#30D158';
  fc.style.stroke=col;
  if(tp.pct===100) fc.style.filter='drop-shadow(0 0 8px '+col+')';
  else fc.style.filter='';
  const rn=document.getElementById('ring-n');
  rn.textContent=tp.pct+'%'; rn.style.color=col;
  document.getElementById('ring-lbl').textContent=DAYS[new Date().getDay()]+' · '+tp.done+'/'+tp.tot+' tasks · '+tp.xe+' XP';

  // ETA
  const e=calcETA();
  if(e.weeks<=0) {
    document.getElementById('wt-eta').innerHTML='<span style="color:var(--green)">Goal reached! 🎉</span>';
    document.getElementById('cdr').innerHTML='<div style="width:100%;text-align:center;font-size:20px;font-weight:700;color:var(--green);padding:16px 0">🎉 70 kg — goal reached!</div>';
    document.getElementById('cdr-note').textContent='';
  } else {
    document.getElementById('wt-eta').textContent='~'+e.weeks+' weeks';
    document.getElementById('cdr').innerHTML=`
      <div class="cdb"><div class="cdn" style="color:var(--blue)">${e.weeks}</div><div class="cdl">weeks</div></div>
      <div class="cdb"><div class="cdn" style="color:var(--orange)">${e.days}</div><div class="cdl">days</div></div>
      <div class="cdb" style="flex:1.5"><div class="cdn" style="font-size:20px;line-height:1.2;color:var(--green)">${MO[e.date.getMonth()]}<br><span style="font-size:14px;color:var(--t3)">${e.date.getFullYear()}</span></div><div class="cdl">target</div></div>`;
    document.getElementById('cdr-note').textContent='At ~'+e.rate.toFixed(1)+' kg/week · '+(GW-cw).toFixed(1)+' kg remaining';
  }

  // Stats
  document.getElementById('s-xp').textContent=totalXP();
  document.getElementById('s-str').textContent=calcStreak();
  document.getElementById('s-wk').textContent=weekPct()+'%';
  const hh=heightHabitPct();
  document.getElementById('s-hh').textContent=hh+'%';
}

// ═══════════════════════════════════════════════
// RENDER: TODAY
// ═══════════════════════════════════════════════
function renderToday() {
  const today=new Date(), dow=today.getDay(), k=dk(today);
  const day=SCH[dow], ck=getck(k), ts=day.tasks;
  document.getElementById('t-title').textContent=DAYS[dow];
  const tp=todayProg();
  const allDone=tp.done===tp.tot&&tp.tot>0;

  let h=`<div class="card">
    <div style="font-size:14px;color:var(--t3);margin-bottom:10px">${today.getDate()} ${MO[today.getMonth()]} &nbsp;·&nbsp; ${day.emoji} ${day.label}</div>
    <div class="row">
      <span class="xpb" id="xpb">+${tp.xe} XP</span>
      <span style="font-size:13px;color:var(--t3)">${tp.xt} XP available today</span>
    </div>
    <div class="pbar" style="margin-top:12px"><div class="pf g" style="width:${tp.pct}%"></div></div>
    <div style="text-align:right;font-size:12px;color:var(--t3);margin-top:6px">${tp.done} / ${tp.tot} tasks</div>
  </div>`;

  if(allDone) {
    h+=`<div class="cel">
      <div class="cel-e">🔥</div>
      <div class="cel-t">Day complete!</div>
      <div class="cel-s">+${tp.xe} XP earned · Come back tomorrow</div>
    </div>`;
  }

  const pending=ts.filter(t=>!ck.includes(t.id));
  const done=ts.filter(t=>ck.includes(t.id));

  h+='<div class="card2"><div>';
  [...pending,...done].forEach(task=>{
    const isDone=ck.includes(task.id);
    const tcol={meal:'var(--orange)',workout:'var(--blue)',habit:'var(--teal)'}[task.t];
    h+=`<div class="tr2" onclick="toggle('${task.id}','${k}')">
      <div class="chk${isDone?' dn':''}">
        ${isDone?`<svg width="11" height="9" viewBox="0 0 11 9" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4.5l3 3L10 1"/></svg>`:''}
      </div>
      <div class="dot ${task.t}" style="${isDone?'opacity:.3':''}"></div>
      <div class="tb">
        <div class="tn${isDone?' dn':''}">${task.n}</div>
        <div class="td">${task.d}</div>
      </div>
      <div class="txp${isDone?' dn':''}">+${task.xp}</div>
    </div>`;
  });
  h+='</div></div>';

  if(!allDone) {
    h+=`<div style="font-size:12px;color:var(--t4);text-align:center;padding:12px 0;line-height:1.6">Missed tasks from past days don't carry over.<br>Just focus on today.</div>`;
  }

  document.getElementById('t-body').innerHTML=h;
}

// ═══════════════════════════════════════════════
// RENDER: LOG
// ═══════════════════════════════════════════════
function renderLog() {
  const log=getwl();
  document.getElementById('wi').placeholder=curwt().toFixed(1);
  if(!log.length) {
    document.getElementById('wt-hist').innerHTML='<div class="empty">No entries yet.<br>Log your first weight above.</div>';
    return;
  }
  let h='';
  [...log].reverse().forEach((e,i,a)=>{
    const d=new Date(e.date+'T12:00:00');
    const ds=d.getDate()+' '+MO[d.getMonth()];
    const prev=a[i+1];
    let diff='';
    if(prev) {
      const dv=e.weight-prev.weight;
      const cls=dv>0?'up':dv<0?'dn2':'';
      const sign=dv>0?'+':'';
      diff=`<span class="whdf ${cls}">${sign}${dv.toFixed(1)}</span>`;
    } else diff='<span class="whdf">start</span>';
    h+=`<div class="whi"><div class="whd">${ds}</div><div class="whr"><div class="whv">${e.weight.toFixed(1)} kg</div>${diff}</div></div>`;
  });
  document.getElementById('wt-hist').innerHTML=h;
}

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════
function toggle(id, k) {
  let ck=getck(k);
  const wasDone=ck.includes(id);
  if(wasDone) {
    ck=ck.filter(x=>x!==id);
    toast('Task unchecked');
  } else {
    ck.push(id);
    const dow=new Date().getDay();
    const task=SCH[dow].tasks.find(t=>t.id===id);
    if(task) toast('+'+task.xp+' XP earned!');
    if(navigator.vibrate) navigator.vibrate([8]);
  }
  setck(k, ck);
  renderToday();
  renderProgress();
  if(!wasDone) {
    const b=document.getElementById('xpb');
    if(b) { b.classList.remove('pop'); void b.offsetWidth; b.classList.add('pop') }
    const tp=todayProg();
    if(tp.done===tp.tot) setTimeout(()=>toast('🔥 Day complete! +'+tp.xe+' XP'),400);
  }
}

function logWt() {
  const v=parseFloat(document.getElementById('wi').value);
  if(isNaN(v)||v<30||v>200) { toast('Enter a valid weight'); return }
  const log=getwl(), today=dk();
  const idx=log.findIndex(e=>e.date===today);
  if(idx>=0) log[idx].weight=v; else log.push({date:today,weight:v});
  savewl(log);
  document.getElementById('wi').value='';
  toast('Logged '+v.toFixed(1)+' kg ✓');
  renderLog(); renderProgress();
}

// ═══════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════
function sw(name) {
  ['progress','today','log'].forEach(n=>{
    document.getElementById('pg-'+n).classList.toggle('on', n===name);
    document.getElementById('tab-'+n).classList.toggle('on', n===name);
  });
  if(name==='today') renderToday();
  else if(name==='log') renderLog();
  else renderProgress();
}

let _tt;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('on'), 2200);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
renderProgress();
renderToday();
renderLog();
</script>
